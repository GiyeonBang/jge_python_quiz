<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>파이썬 문법 퀴즈 게임 (2022 개정 교육과정 반영)</title>
</head>
<body>

    <h1>파이썬 기초 문법 퀴즈 (15문항)</h1>
    <p>빈칸에 알맞은 코드를 입력하고 <b>Enter 키</b>를 누르세요.</p>

    <!-- 문제 설명 영역 -->
    <fieldset>
        <legend>문제 설명</legend>
        <h3 id="problem-description">문제를 불러오는 중...</h3>
    </fieldset>

    <br>

    <!-- 코드 영역 -->
    <fieldset>
        <legend>코드 편집기</legend>
        <pre id="code-area" style="font-size: 16px;"></pre>
    </fieldset>

    <br>

    <!-- 콘솔 창 영역 -->
    <fieldset>
        <legend>콘솔 창</legend>
        <h4 id="console-output">실행 결과가 여기에 표시됩니다.</h4>
    </fieldset>

    <script>
        // =========================================================================
        // [2022 개정 교육과정 반영 문제 데이터]
        // 변수와 자료형, 연산자, 제어구조(조건문/반복문), 리스트, 함수 등 
        // 고등학교 정보 교과의 핵심 프로그래밍 개념을 순차적으로 학습할 수 있도록 구성했습니다.
        // =========================================================================
        var problems = [
            // [1. 입출력과 변수]
            {
                description: "[입출력] 화면에 'Hello, World!'를 출력하는 함수를 작성하세요.",
                code: "___('Hello, World!')",
                answer: "print",
                hint: "파이썬에서 화면에 텍스트나 결과값을 출력할 때 사용하는 p로 시작하는 함수입니다."
            },
            {
                description: "[변수] 변수 score에 숫자 100을 저장(할당)하려고 합니다. 알맞은 기호를 넣으세요.",
                code: "score ___ 100",
                answer: "=",
                hint: "프로그래밍에서는 '같다'는 뜻이 아니라 '오른쪽 값을 왼쪽 변수에 대입한다'는 의미의 대입 연산자입니다."
            },
            {
                description: "[입력] 사용자로부터 키보드로 데이터를 입력받으려고 합니다. 알맞은 함수를 작성하세요.",
                code: "name = ___('이름을 입력하세요: ')",
                answer: "input",
                hint: "사용자의 입력을 받는 함수로, 영어로 '입력'이라는 뜻을 가집니다."
            },
            {
                description: "[자료형] 입력받은 나이는 문자열입니다. 이를 숫자(정수)로 변환하려면 어떤 함수를 써야 할까요?",
                code: "age = ___('17')",
                answer: "int",
                hint: "정수(integer)의 앞 3글자를 딴 함수입니다."
            },
            // [2. 연산자]
            {
                description: "[연산자] 어떤 수가 짝수인지 판별하려면 2로 나눈 '나머지'가 0인지 확인합니다. 나머지 연산자를 넣으세요.",
                code: "is_even = (10 ___ 2 == 0)",
                answer: "%",
                hint: "나머지를 구하는 연산자입니다. 키보드의 숫자 5번에 있는 특수문자입니다."
            },
            // [3. 제어 구조 - 선택 (조건문)]
            {
                description: "[조건문] 점수가 80점 이상'만약(if)' 합격이라고 출력하려 합니다. 알맞은 키워드를 넣으세요.",
                code: "___ score >= 80:\n    print('합격')",
                answer: "if",
                hint: "영어로 '만약 ~라면'이라는 뜻을 가진 두 글자 단어입니다."
            },
            {
                description: "[비교 연산자] user_id가 'admin'과 '같은지' 비교하려고 합니다. 비교 연산자를 넣으세요.",
                code: "if user_id ___ 'admin':\n    print('관리자입니다.')",
                answer: "==",
                hint: "대입 연산자(=)와 구분하기 위해 등호를 두 번 연속해서 씁니다."
            },
            {
                description: "[조건문] if문의 조건이 거짓일 때 실행할 '그렇지 않으면'에 해당하는 키워드를 넣으세요.",
                code: "if score >= 80:\n    print('합격')\n___:\n    print('불합격')",
                answer: "else",
                hint: "if와 짝을 이루어 조건이 거짓일 때 실행되는 블록을 지정합니다. e로 시작합니다."
            },
            // [4. 제어 구조 - 반복 (반복문)]
            {
                description: "[반복문] 지정된 횟수나 데이터 범위 안에서 반복을 수행하는 키워드를 넣으세요.",
                code: "___ i in range(5):\n    print('파이썬 재밌다!')",
                answer: "for",
                hint: "파이썬의 대표적인 반복문 키워드입니다. f로 시작하는 3글자입니다."
            },
            {
                description: "[반복 범위] 0부터 9까지 10번 반복하기 위해 숫자 범위를 생성하는 함수를 넣으세요.",
                code: "for i in ___(10):\n    print(i)",
                answer: "range",
                hint: "연속된 숫자를 만들어주는 함수입니다. 영어로 '범위'를 뜻합니다."
            },
            // [5. 자료 구조 - 리스트]
            {
                description: "[리스트] 여러 학생의 점수를 하나의 묶음으로 저장하려고 합니다. 빈 리스트를 생성하는 괄호를 여세요.",
                code: "scores = ___]",
                answer: "[",
                hint: "리스트를 만들 때는 대괄호( [ ] )를 사용합니다. 여는 대괄호를 입력하세요."
            },
            {
                description: "[리스트] 만들어진 scores 리스트의 맨 끝에 95점을 '추가'하려고 합니다.",
                code: "scores.___(95)",
                answer: "append",
                hint: "리스트 끝에 요소를 덧붙이는 메서드입니다. a로 시작합니다."
            },
            {
                description: "[리스트] 리스트 안에 데이터가 총 몇 개 들어있는지 '길이'를 구하는 함수를 넣으세요.",
                code: "count = ___(scores)",
                answer: "len",
                hint: "길이를 뜻하는 영어 단어 length의 앞 3글자입니다."
            },
            // [6. 함수 및 기타]
            {
                description: "[함수] 나만의 기능을 가진 함수를 '정의'하려고 합니다. 알맞은 키워드를 넣으세요.",
                code: "___ get_average(a, b):\n    return (a + b) / 2",
                answer: "def",
                hint: "함수를 정의(define)할 때 사용하는 3글자 예약어입니다."
            },
            {
                description: "[함수] 함수 안에서 계산된 결과값을 함수 밖으로 '반환'하려고 합니다.",
                code: "def add(x, y):\n    ___ x + y",
                answer: "return",
                hint: "결과를 돌려준다는 의미를 가진 r로 시작하는 단어입니다."
            }
        ];

        // =========================================================================
        // [주요 로직 영역] - 이전과 동일하게 작동합니다.
        // =========================================================================
        
        var currentIndex = 0; 

        function loadProblem() {
            if (currentIndex >= problems.length) {
                document.getElementById("problem-description").innerHTML = "모든 문제를 완료했습니다! 훌륭합니다.";
                document.getElementById("code-area").innerHTML = "Clear!";
                document.getElementById("console-output").innerHTML = "퀴즈 종료됨.";
                document.getElementById("console-output").style.color = "black";
                return;
            }

            var currentProblem = problems[currentIndex];

            document.getElementById("problem-description").innerHTML = currentProblem.description;

            var inputHtml = '<input type="text" id="answer-input" placeholder="빈칸" size="8" autofocus autocomplete="off">';
            var formattedCode = currentProblem.code.replace("___", inputHtml);
            document.getElementById("code-area").innerHTML = formattedCode;

            document.getElementById("console-output").innerHTML = "코드를 입력하고 Enter 키를 누르세요.";
            document.getElementById("console-output").style.color = "black"; 

            var inputBox = document.getElementById("answer-input");
            inputBox.focus(); 
            
            inputBox.onkeydown = function(event) {
                if (event.key === "Enter") {
                    checkAnswer();
                }
            };
        }

        function checkAnswer() {
            var inputBox = document.getElementById("answer-input");
            var studentAnswer = inputBox.value.trim(); 
            var currentProblem = problems[currentIndex];
            var consoleOutput = document.getElementById("console-output");

            if (studentAnswer === currentProblem.answer) {
                consoleOutput.style.color = "blue";
                consoleOutput.innerHTML = "통과!";
                
                inputBox.disabled = true; 

                setTimeout(function() {
                    currentIndex++; 
                    loadProblem();  
                }, 1200); // 학생들이 지루하지 않게 대기 시간을 1.2초로 약간 줄였습니다.
            } else {
                consoleOutput.style.color = "red";
                consoleOutput.innerHTML = "오답입니다. 힌트: " + currentProblem.hint;
                
                inputBox.value = "";
                inputBox.focus();
            }
        }

        window.onload = function() {
            loadProblem();
        };
    </script>

</body>
</html>
